# Pull-and-run only — no local build. Use after images are published to Docker Hub.
services:
  api:
    image: ${DOCKER_USER:-becktkh}/rp-gpio-api:${TAG:-latest}
    container_name: rp-gpio-api
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
      - /dev/gpiochip0:/dev/gpiochip0
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "5000"

  web:
    image: ${DOCKER_USER:-becktkh}/rp-gpio-web:${TAG:-latest}
    container_name: rp-gpio-web
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:3000"
    environment:
      - API_URL=http://api:5000
    depends_on:
      - api
